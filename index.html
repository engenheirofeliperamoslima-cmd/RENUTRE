// ===================== RASTREADOR GPS (estilo Strava, 100% offline) =====================
// Usa navigator.geolocation.watchPosition — funciona sem internet, só com o chip de GPS do
// aparelho. Distância calculada por Haversine entre pontos válidos, com filtros de:
//  1) precisão mínima do fix (accuracy)
//  2) deslocamento mínimo entre pontos (evita ruído/jitter parado somar distância fantasma)
//  3) velocidade máxima plausível (evita "saltos" de GPS inflando a distância)
// O gasto calórico usa um MET dinâmico calculado pela velocidade média real (não um valor fixo).
let GPS = {
  tracking: false,
  paused: false,
  activityId: 'cardio_corrida',
  watchId: null,
  timerId: null,
  points: [],        // todos os fixes brutos recebidos (diagnóstico)
  path: [],           // [[lat,lng], ...] pontos validados usados na distância/rota
  distanceKm: 0,
  startTime: null,
  pauseStart: null,
  pausedAccum: 0,
  lastGoodPoint: null,
  status: 'idle',      // idle | searching | ok | weak | denied | unsupported | finished
  lastResult: null,
  map: null,           // instância Leaflet ativa (mapa real via internet)
  mapPolyline: null,
  mapMarker: null,
  mapContainerId: null,
  wakeLock: null,      // Wake Lock — mantém a tela ligada enquanto o app estiver aberto e rastreando
};
const GPS_DEFAULT_CENTER = [-26.4869, -49.0658]; // Jaraguá do Sul/SC — usado só até o 1º fix de GPS

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
// MET dinâmico a partir da velocidade média medida por GPS (mais real que um valor fixo por atividade)
function metFromPace(activityId, kmh) {
  if (activityId === 'cardio_caminhada') {
    if (kmh < 4) return 2.8;
    if (kmh < 5.5) return 3.5;
    if (kmh < 6.5) return 4.3;
    if (kmh < 7.5) return 6.0;
    return 8.3;
  }
  if (activityId === 'cardio_ciclismo') {
    if (kmh < 16) return 4.0;
    if (kmh < 19) return 6.8;
    if (kmh < 22.5) return 8.0;
    if (kmh < 25.5) return 10.0;
    return 12.0;
  }
  if (kmh < 8) return 8.3;
  if (kmh < 9.5) return 9.8;
  if (kmh < 11) return 11.0;
  if (kmh < 12.5) return 11.8;
  if (kmh < 14.5) return 12.8;
  return 14.5;
}
function formatDuration(sec) {
  sec = Math.max(0, Math.round(sec));
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  const mm = String(m).padStart(2, '0'), ss = String(s).padStart(2, '0');
  return h > 0 ? `${h}:${mm}:${ss}` : `${m}:${ss}`;
}
function formatPace(minPerKm) {
  if (!isFinite(minPerKm) || minPerKm <= 0) return '—';
  const m = Math.floor(minPerKm);
  const s = Math.round((minPerKm - m) * 60);
  return `${m}:${String(s).padStart(2, '0')}/km`;
}
function getGpsElapsedSec() {
  if (!GPS.startTime) return 0;
  const now = Date.now();
  const pausedExtra = GPS.paused && GPS.pauseStart ? (now - GPS.pauseStart) : 0;
  return Math.max(0, (now - GPS.startTime - GPS.pausedAccum - pausedExtra) / 1000);
}

function openGpsTracker(activityId) {
  if (!GPS.tracking) { GPS.activityId = activityId; GPS.status = 'idle'; GPS.lastResult = null; }
  showView('gps');
}
function exitGpsTracker() {
  if (GPS.tracking) {
    if (!confirm('Você tem um rastreio em andamento. Sair agora vai descartar o progresso não salvo. Continuar?')) return;
    stopGpsWatch();
    resetGpsState();
    renderHomeGpsLive();
  }
  showView('diario');
}
function stopGpsWatch() {
  if (GPS.watchId != null && navigator.geolocation) navigator.geolocation.clearWatch(GPS.watchId);
  GPS.watchId = null;
  if (GPS.timerId) { clearInterval(GPS.timerId); GPS.timerId = null; }
  releaseWakeLock();
}
function resetGpsState() {
  GPS.tracking = false; GPS.paused = false; GPS.points = []; GPS.path = [];
  GPS.distanceKm = 0; GPS.startTime = null; GPS.pauseStart = null; GPS.pausedAccum = 0;
  GPS.lastGoodPoint = null; GPS.status = 'idle';
  destroyGpsMap();
}

// Mantém a tela ligada enquanto o app estiver aberto e rastreando (não existe "segundo plano"
// verdadeiro com tela apagada/app fechado em uma página web comum — isso exigiria um app nativo).
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      GPS.wakeLock = await navigator.wakeLock.request('screen');
      GPS.wakeLock.addEventListener('release', () => { GPS.wakeLock = null; });
    }
  } catch (e) { /* alguns navegadores negam silenciosamente — segue o rastreio normalmente */ }
}
function releaseWakeLock() {
  if (GPS.wakeLock) { try { GPS.wakeLock.release(); } catch (e) {} GPS.wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  // Se a aba voltar a ficar visível durante um rastreio, restaura o wake lock e força
  // uma atualização imediata do mapa/estatísticas (o GPS continua contando o tempo todo).
  if (document.visibilityState === 'visible' && GPS.tracking && !GPS.paused) {
    requestWakeLock();
    if (APP.currentView === 'gps') renderGpsTracker();
    if (APP.currentView === 'home') renderHomeGpsLive();
  }
});

function startGpsTracking() {
  if (!('geolocation' in navigator)) {
    GPS.status = 'unsupported';
    renderGpsTracker();
    showToast('Seu navegador não tem suporte a GPS', 'error');
    return;
  }
  stopHomeLocationWatch();
  destroyHomeMap();
  resetGpsState();
  GPS.tracking = true;
  GPS.status = 'searching';
  GPS.startTime = Date.now();
  renderGpsTracker();
  renderHomeGpsLive();
  requestWakeLock();
  GPS.watchId = navigator.geolocation.watchPosition(handleGpsPosition, handleGpsError, {
    enableHighAccuracy: true, maximumAge: 1000, timeout: 15000
  });
  GPS.timerId = setInterval(updateGpsLiveStats, 1000);
}
function pauseGpsTracking() {
  if (!GPS.tracking || GPS.paused) return;
  GPS.paused = true;
  GPS.pauseStart = Date.now();
  stopGpsWatch();
  renderGpsTracker();
}
function resumeGpsTracking() {
  if (!GPS.tracking || !GPS.paused) return;
  GPS.paused = false;
  GPS.pausedAccum += Date.now() - GPS.pauseStart;
  GPS.pauseStart = null;
  GPS.status = 'searching';
  requestWakeLock();
  GPS.watchId = navigator.geolocation.watchPosition(handleGpsPosition, handleGpsError, {
    enableHighAccuracy: true, maximumAge: 1000, timeout: 15000
  });
  GPS.timerId = setInterval(updateGpsLiveStats, 1000);
  renderGpsTracker();
}
function discardGpsTracking() {
  if (!confirm('Descartar este rastreio sem salvar?')) return;
  stopGpsWatch();
  resetGpsState();
  renderGpsTracker();
  renderHomeGpsLive();
}
function finishGpsTracking() {
  if (!GPS.tracking) return;
  if (GPS.distanceKm < 0.05 && !confirm('Distância registrada muito curta (menos de 50 m). Finalizar mesmo assim?')) return;
  stopGpsWatch();

  const elapsedSec = getGpsElapsedSec();
  const distanceKm = Math.round(GPS.distanceKm * 100) / 100;
  const avgSpeedKmh = elapsedSec > 0 ? distanceKm / (elapsedSec / 3600) : 0;
  const paceMinKm = distanceKm > 0 ? (elapsedSec / 60) / distanceKm : 0;
  const met = metFromPace(GPS.activityId, avgSpeedKmh);
  const peso = APP.profile?.peso || 70;
  const cal = calcCalWorkout(met, peso, elapsedSec / 60);
  const catalogItem = WORKOUT_CATALOG.find(w => w.id === GPS.activityId);

  const sessionId = Date.now().toString();
  const gpsSession = {
    id: sessionId, date: APP.diarioDate, activityId: GPS.activityId,
    distanceKm, durationSec: Math.round(elapsedSec),
    avgSpeedKmh: Math.round(avgSpeedKmh * 10) / 10, paceMinKm: Math.round(paceMinKm * 100) / 100,
    met, cal, points: GPS.path,
  };
  APP.gpsSessions.unshift(gpsSession);
  saveGpsSessions();

  APP.workouts.push({
    id: sessionId + '_w', date: APP.diarioDate, name: `${catalogItem.name} (GPS)`, group: 'Cardio',
    icon: catalogItem.icon, modo: 'gps', distanceKm, duracao: Math.round(elapsedSec / 60), met, cal, gpsSessionId: sessionId,
  });
  saveWorkouts();

  showXPGain(20, window.innerWidth/2, 220);
  showToast(`${catalogItem.icon} ${distanceKm.toFixed(2)} km registrados — ${cal} kcal`, 'success');

  GPS.lastResult = gpsSession;
  resetGpsState();
  GPS.status = 'finished';
  renderGpsTracker();
  renderHomeGpsLive();
  if (APP.currentView === 'home') { renderTreinoHoje(APP.profile); renderTreinoStats(); }
}

// Cria (ou recria) o mapa Leaflet real dentro do container informado, usando tiles do
// OpenStreetMap via internet. Sem conexão, os tiles simplesmente não carregam, mas a rota
// (calculada localmente pelo GPS) continua sendo desenhada normalmente por cima.
function destroyGpsMap() {
  if (GPS.map) { try { GPS.map.remove(); } catch (e) {} }
  GPS.map = null; GPS.mapPolyline = null; GPS.mapMarker = null; GPS.mapContainerId = null;
}
function initGpsMap(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (typeof L === 'undefined') { el.innerHTML = '<div class="gps-map-fallback">🗺️ Mapa indisponível (sem conexão no carregamento da página) — a distância continua sendo medida normalmente pelo GPS.</div>'; return; }
  destroyGpsMap();
  GPS.mapContainerId = containerId;
  const center = GPS.path.length ? GPS.path[GPS.path.length - 1] : GPS_DEFAULT_CENTER;
  GPS.map = L.map(containerId, { zoomControl: false, attributionControl: false }).setView(center, GPS.path.length ? 17 : 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20, subdomains: 'abcd' }).addTo(GPS.map);
  GPS.mapPolyline = L.polyline(GPS.path, { color: '#2d7a5a', weight: 4, opacity: 0.9 }).addTo(GPS.map);
  if (GPS.path.length) {
    GPS.mapMarker = L.circleMarker(GPS.path[GPS.path.length - 1], { radius: 8, color: '#ffffff', weight: 3, fillColor: '#4285F4', fillOpacity: 1 }).addTo(GPS.map);
  }
  setTimeout(() => { if (GPS.map && GPS.mapContainerId === containerId) GPS.map.invalidateSize(); }, 150);
}
function updateGpsMapLive() {
  if (!GPS.map || !GPS.path.length) return;
  const last = GPS.path[GPS.path.length - 1];
  if (GPS.mapPolyline) GPS.mapPolyline.setLatLngs(GPS.path);
  if (GPS.mapMarker) GPS.mapMarker.setLatLng(last);
  else GPS.mapMarker = L.circleMarker(last, { radius: 8, color: '#ffffff', weight: 3, fillColor: '#4285F4', fillOpacity: 1 }).addTo(GPS.map);
  GPS.map.panTo(last, { animate: true });
}

function handleGpsPosition(pos) {
  const { latitude, longitude, accuracy } = pos.coords;
  const t = pos.timestamp || Date.now();
  GPS.points.push({ lat: latitude, lng: longitude, t, acc: accuracy });
  GPS.status = accuracy <= 30 ? 'ok' : 'weak';

  if (accuracy <= 30) {
    const prev = GPS.lastGoodPoint;
    if (prev) {
      const distKm = haversineKm(prev.lat, prev.lng, latitude, longitude);
      const dtSec = Math.max(0.001, (t - prev.t) / 1000);
      const speedKmh = (distKm / dtSec) * 3600;
      const distM = distKm * 1000;
      const minMoveM = Math.max(3, accuracy * 0.6);           // filtro de ruído/jitter parado
      const maxSpeedKmh = GPS.activityId === 'cardio_ciclismo' ? 70 : 30; // filtro de salto/glitch

      if (distM >= minMoveM && speedKmh <= maxSpeedKmh) {
        GPS.distanceKm += distKm;
        GPS.lastGoodPoint = { lat: latitude, lng: longitude, t };
        GPS.path.push([latitude, longitude]);
        if (GPS.map) updateGpsMapLive(); else drawRouteCanvas();
      }
    } else {
      GPS.lastGoodPoint = { lat: latitude, lng: longitude, t };
      GPS.path.push([latitude, longitude]);
      if (typeof L !== 'undefined' && GPS.mapContainerId && !GPS.map) initGpsMap(GPS.mapContainerId);
      if (GPS.map) updateGpsMapLive(); else drawRouteCanvas();
    }
  }
  updateGpsLiveStats();
}
function handleGpsError(err) {
  if (err.code === err.PERMISSION_DENIED) { GPS.status = 'denied'; showToast('Permissão de localização negada', 'error'); }
  else { GPS.status = 'weak'; }
  updateGpsStatusPill();
}

function updateGpsLiveStats() {
  if (!GPS.tracking) return;
  const elapsedSec = getGpsElapsedSec();
  const distanceKm = Math.round(GPS.distanceKm * 100) / 100;
  const avgSpeedKmh = elapsedSec > 0 ? GPS.distanceKm / (elapsedSec / 3600) : 0;
  const paceMinKm = GPS.distanceKm > 0.01 ? (elapsedSec / 60) / GPS.distanceKm : 0;
  const met = metFromPace(GPS.activityId, avgSpeedKmh);
  const peso = APP.profile?.peso || 70;
  const cal = calcCalWorkout(met, peso, elapsedSec / 60);

  const elD = document.getElementById('gps-live-distance');
  const elT = document.getElementById('gps-live-duration');
  const elP = document.getElementById('gps-live-pace');
  const elC = document.getElementById('gps-live-cal');
  if (elD) elD.textContent = distanceKm.toFixed(2);
  if (elT) elT.textContent = formatDuration(elapsedSec);
  if (elP) elP.textContent = GPS.activityId === 'cardio_ciclismo' ? `${avgSpeedKmh.toFixed(1)} km/h` : formatPace(paceMinKm);
  if (elC) elC.textContent = cal;

  const hD = document.getElementById('home-gps-distance');
  const hT = document.getElementById('home-gps-duration');
  const hC = document.getElementById('home-gps-cal');
  if (hD) hD.textContent = distanceKm.toFixed(2);
  if (hT) hT.textContent = formatDuration(elapsedSec);
  if (hC) hC.textContent = cal;

  updateGpsStatusPill();
}
function updateGpsStatusPill() {
  const statusMap = {
    idle: '🛰️ Pronto para iniciar', searching: '🔍 Procurando sinal…', ok: '🟢 Sinal bom',
    weak: '🟡 Sinal fraco — área aberta ajuda', denied: '🔴 Sem permissão de localização',
    unsupported: '🔴 GPS não suportado', finished: '✅ Rastreio concluído',
  };
  const text = statusMap[GPS.status] || '🛰️ —';
  const pill = document.getElementById('gps-status-pill');
  if (pill) pill.textContent = text;
  const homePill = document.getElementById('home-gps-status-pill');
  if (homePill) homePill.textContent = text;
}

// Desenha a rota como um traçado simples (projeção equirretangular local) — sem depender de
// nenhum servidor de mapas, então funciona totalmente offline.
function projectGpsPoint(lat, lng, lat0, lng0) {
  const R = 6371000;
  const x = (lng - lng0) * Math.PI / 180 * R * Math.cos(lat0 * Math.PI / 180);
  const y = (lat - lat0) * Math.PI / 180 * R;
  return { x, y };
}
function drawRouteCanvas() {
  const canvas = document.getElementById('gps-route-canvas');
  if (!canvas || GPS.path.length < 1) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width = canvas.clientWidth * dpr;
  const h = canvas.height = canvas.clientHeight * dpr;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);

  const [lat0, lng0] = GPS.path[0];
  const pts = GPS.path.map(([lat, lng]) => projectGpsPoint(lat, lng, lat0, lng0));

  if (pts.length < 2) {
    ctx.fillStyle = '#2d7a5a';
    ctx.beginPath(); ctx.arc(w/2, h/2, 5*dpr, 0, Math.PI*2); ctx.fill();
    return;
  }
  const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
  const pad = 24 * dpr;
  const spanX = Math.max(1, maxX - minX), spanY = Math.max(1, maxY - minY);
  const scale = Math.min((w - 2*pad) / spanX, (h - 2*pad) / spanY);

  ctx.strokeStyle = '#2d7a5a';
  ctx.lineWidth = 3 * dpr;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.beginPath();
  pts.forEach((p, i) => {
    const px = pad + (p.x - minX) * scale;
    const py = h - pad - (p.y - minY) * scale;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  });
  ctx.stroke();

  const start = pts[0], last = pts[pts.length - 1];
  const sx = pad + (start.x - minX) * scale, sy = h - pad - (start.y - minY) * scale;
  const lx = pad + (last.x - minX) * scale, ly = h - pad - (last.y - minY) * scale;
  ctx.fillStyle = '#2d7a5a'; ctx.beginPath(); ctx.arc(sx, sy, 5*dpr, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#d4a574'; ctx.beginPath(); ctx.arc(lx, ly, 6*dpr, 0, Math.PI*2); ctx.fill();
}

function renderGpsHistoryList() {
  if (!APP.gpsSessions.length) return '';
  const rows = APP.gpsSessions.slice(0, 10).map(r => {

        <span class="log-item-del" onclick="removeGpsSession('${r.id}')">✕</span>
      </div>`;
  }).join('');
  return `<div class="gps-history"><div class="wtreino-hoje-title" style="margin-top:16px">📜 Histórico de rastreios</div>${rows}</div>`;
}
function removeGpsSession(id) {
  APP.gpsSessions = APP.gpsSessions.filter(s => s.id !== id);
  saveGpsSessions();
  APP.workouts = APP.workouts.filter(w => w.gpsSessionId !== id);
  saveWorkouts();
  renderGpsTracker();
}

function renderGpsTracker() {
  const content = document.getElementById('gps-content');
  if (!content) return;
  updateGpsStatusPill();

  if (GPS.tracking) {
    const catalogItem = WORKOUT_CATALOG.find(w => w.id === GPS.activityId);
    const useLiveMap = typeof L !== 'undefined';
    const mapHtml = useLiveMap
      ? `<div id="gps-route-map" class="gps-route-map"></div>`
      : `<canvas id="gps-route-canvas" class="gps-route-canvas"></canvas>`;
    content.innerHTML = `
      <div class="gps-live-card">
        <div class="gps-live-activity">${catalogItem.icon} ${catalogItem.name}${GPS.paused ? ' · ⏸️ Pausado' : ''}</div>
        <div class="gps-live-grid">
          <div class="gps-live-stat"><span class="gps-live-val" id="gps-live-distance">0.00</span><span class="gps-live-label">km</span></div>
          <div class="gps-live-stat"><span class="gps-live-val" id="gps-live-duration">0:00</span><span class="gps-live-label">duração</span></div>
        </div>
        <div class="gps-live-grid">
          <div class="gps-live-stat"><span class="gps-live-val" id="gps-live-pace">—</span><span class="gps-live-label">${GPS.activityId==='cardio_ciclismo'?'vel. média':'ritmo médio'}</span></div>
          <div class="gps-live-stat"><span class="gps-live-val" id="gps-live-cal">0</span><span class="gps-live-label">kcal</span></div>
        </div>
        ${mapHtml}
        <p class="gps-offline-note">${useLiveMap ? '🗺️ Mapa ao vivo via internet (OpenStreetMap) — se a conexão cair, a rota continua sendo medida pelo GPS normalmente.' : '🛰️ Sem internet no momento — medindo por GPS puro, o traçado aparece sem o mapa de fundo.'} Distância validada por precisão do sinal, filtro de ruído parado e velocidade máxima plausível.</p>
        <div class="gps-controls">
          ${GPS.paused
            ? `<button class="gps-btn gps-btn-primary" onclick="resumeGpsTracking()">▶️ Retomar</button>`
            : `<button class="gps-btn gps-btn-secondary" onclick="pauseGpsTracking()">⏸️ Pausar</button>`}
          <button class="gps-btn gps-btn-finish" onclick="finishGpsTracking()">🏁 Finalizar</button>
        </div>
        <button class="gps-discard-btn" onclick="discardGpsTracking()">Descartar rastreio</button>
      </div>`;
    if (useLiveMap) initGpsMap('gps-route-map'); else drawRouteCanvas();
    return;
  }

  if (GPS.status === 'finished' && GPS.lastResult) {
    const r = GPS.lastResult;
    const catalogItem = WORKOUT_CATALOG.find(w => w.id === r.activityId) || {};
    content.innerHTML = `
      <div class="gps-live-card gps-summary-card">
        <div class="gps-live-activity">✅ ${catalogItem.icon} ${catalogItem.name} concluído</div>
        <div class="gps-live-grid">
          <div class="gps-live-stat"><span class="gps-live-val">${r.distanceKm.toFixed(2)}</span><span class="gps-live-label">km</span></div>
          <div class="gps-live-stat"><span class="gps-live-val">${formatDuration(r.durationSec)}</span><span class="gps-live-label">duração</span></div>
        </div>
        <div class="gps-live-grid">
          <div class="gps-live-stat"><span class="gps-live-val">${r.activityId==='cardio_ciclismo' ? r.avgSpeedKmh.toFixed(1)+' km/h' : formatPace(r.paceMinKm)}</span><span class="gps-live-label">${r.activityId==='cardio_ciclismo'?'vel. média':'ritmo médio'}</span></div>
          <div class="gps-live-stat"><span class="gps-live-val">${r.cal}</span><span class="gps-live-label">kcal reais</span></div>
        </div>
        <p class="gps-offline-note">Gasto calculado pelo MET real da sua velocidade média — já somado ao diário de hoje.</p>
        <div class="gps-controls">
          <button class="gps-btn gps-btn-primary" onclick="showView('diario')">Ver no diário →</button>
          <button class="gps-btn gps-btn-secondary" onclick="GPS.status='idle';renderGpsTracker()">Novo rastreio</button>
        </div>
      </div>
      ${renderGpsHistoryList()}`;
    return;
  }

  const gpsActivities = WORKOUT_CATALOG.filter(w => w.gps);
  const activityChips = gpsActivities.map(a => `<button class="workout-cat-tab ${GPS.activityId===a.id?'active':''}" onclick="GPS.activityId='${a.id}';renderGpsTracker()">${a.icon} ${a.name}</button>`).join('');
  const supportWarning = !('geolocation' in navigator) ? `<p class="gps-offline-note" style="color:#f87171">Seu navegador não tem suporte a geolocalização.</p>` : '';

  content.innerHTML = `
    <div class="gps-live-card">
      <div class="logger-title">🛰️ Rastreador GPS</div>
      <div class="logger-sub">Mede a distância pelo GPS do aparelho e mostra o mapa ao vivo automaticamente quando há internet — sem internet, a distância continua sendo medida normalmente, só sem o mapa de fundo</div>
      <div class="workout-cat-tabs" style="margin:12px 0">${activityChips}</div>
      ${supportWarning}
      <button class="gps-btn gps-btn-primary" style="width:100%" onclick="startGpsTracking()">▶️ Iniciar rastreio</button>
    </div>
    ${renderGpsHistoryList()}`;
}

// Card com mapa ao vivo no painel principal. Sempre visível (mostra sua localização atual,
// atualizada periodicamente) — e quando há um rastreio de atividade em andamento, mostra a
// rota e as estatísticas em tempo real. A captura de GPS continua mesmo navegando entre telas.
function renderHomeGpsLive() {
  const el = document.getElementById('home-gps-live');
  if (!el) return;
  const useLiveMap = typeof L !== 'undefined';

  if (GPS.tracking) {
    stopHomeLocationWatch();
    destroyHomeMap();
    const catalogItem = WORKOUT_CATALOG.find(w => w.id === GPS.activityId) || {};
    const mapHtml = useLiveMap ? `<div id="home-gps-map" class="home-gps-map"></div>` : '';
    el.innerHTML = `
      <div class="home-gps-card">
        <div class="home-gps-head" onclick="showView('gps')">
          <span>${catalogItem.icon} ${catalogItem.name} em andamento${GPS.paused ? ' · ⏸️ pausado' : ''}</span>
          <span class="gps-status-pill" id="home-gps-status-pill">🛰️ —</span>
        </div>
        ${mapHtml}
        <div class="home-gps-stats" onclick="showView('gps')">
          <span><strong id="home-gps-distance">0.00</strong><small>km</small></span>
          <span><strong id="home-gps-duration">0:00</strong><small>tempo</small></span>
          <span><strong id="home-gps-cal">0</strong><small>kcal</small></span>
        </div>
        <div class="home-gps-cta" onclick="showView('gps')">Toque para abrir o rastreador →</div>
      </div>`;
    if (useLiveMap) initGpsMap('home-gps-map');
    updateGpsLiveStats();
    return;
  }

  // Sem rastreio ativo: mostra um mapa ao vivo com sua localização atual (estilo Google Maps)
  destroyGpsMap();
  el.innerHTML = `
    <div class="home-gps-card home-gps-idle">
      <div class="home-gps-head">
        <span>🗺️ Sua localização</span>
        <span class="gps-status-pill" id="home-loc-status-pill">🛰️ —</span>
      </div>
      ${useLiveMap ? `<div id="home-loc-map" class="home-gps-map"></div>` : `<p class="gps-offline-note">Mapa indisponível sem internet no carregamento da página — a distância de um rastreio continua funcionando por GPS puro.</p>`}
      <div class="home-gps-cta" onclick="showView('gps')">🏃 Iniciar rastreio de atividade →</div>
    </div>`;
  if (useLiveMap) startHomeLocationWatch();
}

// ===================== MAPA DE LOCALIZAÇÃO AO VIVO (dashboard, fora de um rastreio) =====================
let HOME_MAP = { map: null, marker: null, intervalId: null, status: 'idle' };

function updateHomeLocStatus() {
  const pill = document.getElementById('home-loc-status-pill');
  if (!pill) return;
  const map = { idle: '🛰️ —', searching: '🔍 Localizando…', ok: '🟢 Ao vivo', weak: '🟡 Sinal fraco', denied: '🔴 Permissão negada', unsupported: '🔴 Sem suporte' };
  pill.textContent = map[HOME_MAP.status] || '🛰️ —';
}
function placeHomeLocation(lat, lng) {
  const el = document.getElementById('home-loc-map');
  if (!el || typeof L === 'undefined') return;
  if (!HOME_MAP.map) {
    HOME_MAP.map = L.map('home-loc-map', { zoomControl: false, attributionControl: false }).setView([lat, lng], 16);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20, subdomains: 'abcd' }).addTo(HOME_MAP.map);
    HOME_MAP.marker = L.circleMarker([lat, lng], { radius: 8, color: '#ffffff', weight: 3, fillColor: '#4285F4', fillOpacity: 1 }).addTo(HOME_MAP.map);
    setTimeout(() => HOME_MAP.map && HOME_MAP.map.invalidateSize(), 150);
  } else {
    HOME_MAP.marker.setLatLng([lat, lng]);
    HOME_MAP.map.panTo([lat, lng]);
  }
}
function fetchHomeLocationOnce() {
  if (!('geolocation' in navigator)) { HOME_MAP.status = 'unsupported'; updateHomeLocStatus(); return; }
  HOME_MAP.status = 'searching';
  updateHomeLocStatus();
  navigator.geolocation.getCurrentPosition(
    pos => { placeHomeLocation(pos.coords.latitude, pos.coords.longitude); HOME_MAP.status = 'ok'; updateHomeLocStatus(); },
    err => { HOME_MAP.status = err.code === err.PERMISSION_DENIED ? 'denied' : 'weak'; updateHomeLocStatus(); },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 20000 }
  );
}
function startHomeLocationWatch() {
  fetchHomeLocationOnce();
  stopHomeLocationWatch();
  HOME_MAP.intervalId = setInterval(fetchHomeLocationOnce, 30000); // atualiza a cada 30s enquanto o dashboard estiver aberto
}
function stopHomeLocationWatch() {
  if (HOME_MAP.intervalId) { clearInterval(HOME_MAP.intervalId); HOME_MAP.intervalId = null; }
}
function destroyHomeMap() {
  if (HOME_MAP.map) { try { HOME_MAP.map.remove(); } catch (e) {} }
  HOME_MAP.map = null; HOME_MAP.marker = null;
}

// ===================== SETTINGS =====================
let settingsForm = null;

function renderSettings(reinit) {
  if (reinit !== false || !settingsForm) {
    settingsForm = JSON.parse(JSON.stringify(APP.profile));

  const p = settingsForm;

  const treinoPreviewHtml = _treinoPreviewHtml(p);

  const ativOptions = ATIVIDADE_OPTIONS.map(a =>

        <div class="settings-field"><label>Peso (kg)</label><input class="settings-input" type="number" id="sf-peso" step="0.1" value="${p.peso||''}"></div>
      </div>
      <div class="settings-grid-2">
        <div class="settings-field"><label>Altura (cm)</label><input class="settings-input" type="number" id="sf-altura" value="${p.altura||''}"></div>
        <div class="settings-field"><label>% Gordura (opc.)</label><input class="settings-input" type="number" id="sf-bf" step="0.1" value="${p.bf||''}"></div>
      </div>
      <div class="settings-field">
        <label>Sexo biológico</label>
        <div class="settings-grid-2">
          <button class="settings-sel-btn ${p.sexo==='masculino'?'active':''}" onclick="settingsSetSexo('masculino')">♂ Masculino</button>
          <button class="settings-sel-btn ${p.sexo==='feminino'?'active':''}" onclick="settingsSetSexo('feminino')">♀ Feminino</button>
        </div>
      </div>
      <div class="settings-field">
        <label>Objetivo</label>
        <div class="grid-3">
          <button class="settings-sel-btn ${p.objetivo==='perda'?'active':''}" onclick="settingsSetObj('perda')">📉 Perder</button>
          <button class="settings-sel-btn ${p.objetivo==='manutencao'?'active':''}" onclick="settingsSetObj('manutencao')">⚖️ Manter</button>
          <button class="settings-sel-btn ${p.objetivo==='ganho'?'active':''}" onclick="settingsSetObj('ganho')">📈 Ganhar</button>
        </div>
      </div>
      <div class="settings-field">
        <label>Nível de atividade</label>
        <select class="settings-select" id="sf-atividade">${ativOptions}</select>
      </div>
    </div>

    <!-- MISSÃO META -->
    <div class="settings-section mission">
      <div class="settings-section-header"><span style="color:var(--gold)">🎯</span><h3>Missão: Meta de Peso</h3><span class="mission-badge-lbl">Missão</span></div>
      <p class="settings-sub">Defina seu peso objetivo para desbloquear projeções de probabilidade.</p>
      <div class="settings-field"><label>Peso objetivo (kg)</label><input class="settings-input" type="number" id="sf-peso-obj" step="0.1" value="${p.peso_objetivo||''}" placeholder="Ex: 72"></div>
      <div class="settings-grid-2">
        <div class="settings-field"><label>Início do ciclo</label><input class="settings-input" type="date" id="sf-ciclo-inicio" value="${p.ciclo_inicio||''}"></div>
        <div class="settings-field"><label>Fim do ciclo</label><input class="settings-input" type="date" id="sf-ciclo-fim" value="${p.ciclo_fim||''}"></div>
      </div>
    </div>

    <!-- SPLIT DE TREINO -->
    <div class="settings-section mission">
      <div class="settings-section-header"><span style="color:var(--gold)">🏋️</span><h3>Missão: Rotina de Treino</h3><span class="mission-badge-lbl">Missão</span></div>
      <p class="settings-sub">Configure sua divisão de treino para eu te avisar todo dia qual grupo muscular treinar e a fase de intensidade do mês.</p>
      <div class="settings-field">
        <label>Tipo de divisão</label>
        <div class="grid-3">
          <button class="settings-sel-btn ${ts.tipo==='full'?'active':''}" onclick="settingsSetSplitTipo('full')">Corpo Inteiro</button>
          <button class="settings-sel-btn ${ts.tipo==='AB'?'active':''}" onclick="settingsSetSplitTipo('AB')">AB</button>
          <button class="settings-sel-btn ${ts.tipo==='ABC'?'active':''}" onclick="settingsSetSplitTipo('ABC')">ABC</button>
        </div>
        <button class="settings-sel-btn ${ts.tipo==='ABCD'?'active':''}" onclick="settingsSetSplitTipo('ABCD')" style="width:100%;margin-top:8px">ABCD</button>
      </div>
      <div class="settings-field">
        <label>Dias de treino na semana</label>
        <div class="weekday-row">${WEEKDAY_CODES.map((code,i) => `<button class="weekday-btn ${ts.dias.includes(code)?'active':''}" onclick="settingsToggleDia('${code}')">${WEEKDAY_SHORT[i]}</button>`).join('')}</div>
      </div>
      <div class="settings-field"><label>Início do ciclo</label><input class="settings-input" type="date" id="sf-treino-inicio" value="${ts.inicio||toISO(new Date())}" onchange="settingsUpdateTreinoPreview()"></div>
      <div class="settings-field">
        <label>Meta de gasto calórico por treino (kcal)</label>
        <input class="settings-input" type="number" id="sf-treino-meta" placeholder="Sugestão automática: ${calcMetaTreinoDiaria(p)} kcal" value="${p.treino_meta_kcal||''}">
        <p class="settings-sub" style="margin-top:4px">Deixe em branco para usar a sugestão automática (baseada em peso, objetivo e experiência).</p>
      </div>
      <div id="settings-treino-preview">${treinoPreviewHtml}</div>
    </div>

    <!-- SONO -->
    <div class="settings-section mission">
      <div class="settings-section-header"><span style="color:var(--gold)">🌙</span><h3>Missão: Sono e Cronotipo</h3><span class="mission-badge-lbl">Missão</span></div>
      <p class="settings-sub">Configure seus horários de sono para descobrir seu cronotipo.</p>
      <div class="settings-grid-2">
        <div class="settings-field"><label>Hora de dormir</label><input class="settings-input" type="time" id="sf-dormir" value="${p.sono_dormir||'23:00'}" oninput="settingsUpdateCronotipo()"></div>
        <div class="settings-field"><label>Hora de acordar</label><input class="settings-input" type="time" id="sf-acordar" value="${p.sono_acordar||'06:00'}" oninput="settingsUpdateCronotipo()"></div>
      </div>
      <div id="settings-cronotipo-box">${cronotipo ? `<div class="settings-cronotipo"><p><strong>Cronotipo: ${cronotipo.label}</strong> — Sua janela de melhor desempenho é ${cronotipo.faixaPreferida}. Duração: ~${cronotipo.duracaoSonoHoras.toFixed(1)}h/noite.</p></div>` : ''}</div>
    </div>

    <!-- RESTRIÇÕES -->
    <div class="settings-section normal">
      <div class="settings-section-header"><span>🥗</span><h3>Restrições Alimentares</h3></div>
      <div class="settings-field"><select class="settings-select" id="sf-restricao">${restOptions}</select></div>
    </div>

    <!-- EXPERIÊNCIA -->
    <div class="settings-section normal">
      <div class="settings-section-header"><span>🏋️</span><h3>Experiência com Treino</h3></div>
      <div class="grid-3">
        <button class="settings-sel-btn ${p.experiencia==='iniciante'?'active':''}" onclick="settingsSetExp('iniciante')">Iniciante</button>
        <button class="settings-sel-btn ${p.experiencia==='intermediario'?'active':''}" onclick="settingsSetExp('intermediario')">Intermediário</button>
        <button class="settings-sel-btn ${p.experiencia==='avancado'?'active':''}" onclick="settingsSetExp('avancado')">Avançado</button>
      </div>
    </div>

    <!-- BACKUP -->
    <div class="settings-section normal">
      <div class="settings-section-header"><span>💾</span><h3>Backup dos Dados</h3></div>
      <p class="settings-sub">Seus dados ficam só neste navegador. Exporte um arquivo para guardar cópia ou levar para outro dispositivo.</p>
      <div class="settings-grid-2">
        <button class="settings-sel-btn" onclick="exportBackup()">⬇️ Exportar backup</button>
        <button class="settings-sel-btn" onclick="document.getElementById('sf-import-file').click()">⬆️ Importar backup</button>
      </div>
      <input type="file" id="sf-import-file" accept="application/json" style="display:none" onchange="importBackupFile(this)">
    </div>

    <div class="settings-danger">
      <button class="danger-btn" onclick="resetApp()">🗑️ Limpar todos os dados e recomeçar</button>
    </div>

  document.getElementById('settings-save-btn').onclick = saveSettings;
}

function settingsSetSexo(s) { _syncSettingsInputs(); settingsForm.sexo = s; renderSettings(false); }
function settingsSetObj(o) { _syncSettingsInputs(); settingsForm.objetivo = o; renderSettings(false); }
function settingsSetExp(e) { _syncSettingsInputs(); settingsForm.experiencia = e; renderSettings(false); }

function settingsSetSplitTipo(tipo) {
  _syncSettingsInputs();
  settingsForm.treino_split.tipo = tipo;
  renderSettings(false);
}
function settingsToggleDia(code) {
  _syncSettingsInputs();
  const dias = settingsForm.treino_split.dias;
  const idx = dias.indexOf(code);
  if (idx >= 0) dias.splice(idx, 1); else dias.push(code);
  renderSettings(false);
}
function settingsUpdateTreinoPreview() {
  const inp = document.getElementById('sf-treino-inicio');
  if (inp) settingsForm.treino_split.inicio = inp.value;
  const box = document.getElementById('settings-treino-preview');
  if (box) box.innerHTML = _treinoPreviewHtml(settingsForm);
}
function _treinoPreviewHtml(profile) {
  const info = calcularTreinoHoje(profile);
  if (!info) return '';
  const status = info.isTreinoHoje ? `Treino ${info.letra} — ${info.grupo}` : `Descanso (próximo: ${info.letra} — ${info.grupo})`;
  return `<div class="settings-cronotipo"><p><strong>Hoje:</strong> ${status}. ${info.fase.icon} Fase do mês: ${info.fase.nome}.</p></div>`;
}

// Sync current input values into settingsForm before re-rendering
function _syncSettingsInputs() {
  const get = id => document.getElementById(id);
  if (get('sf-nome')) settingsForm.nome = get('sf-nome').value;
  if (get('sf-idade')) settingsForm.idade = Number(get('sf-idade').value) || settingsForm.idade;
  if (get('sf-peso')) settingsForm.peso = Number(get('sf-peso').value) || settingsForm.peso;
  if (get('sf-altura')) settingsForm.altura = Number(get('sf-altura').value) || settingsForm.altura;
  if (get('sf-bf')) settingsForm.bf = parseFloat(get('sf-bf').value) || null;
  if (get('sf-atividade')) settingsForm.atividade = Number(get('sf-atividade').value) || settingsForm.atividade;
  if (get('sf-peso-obj')) settingsForm.peso_objetivo = parseFloat(get('sf-peso-obj').value) || null;
  if (get('sf-ciclo-inicio')) settingsForm.ciclo_inicio = get('sf-ciclo-inicio').value || settingsForm.ciclo_inicio;
  if (get('sf-ciclo-fim')) settingsForm.ciclo_fim = get('sf-ciclo-fim').value || settingsForm.ciclo_fim;
  if (get('sf-treino-inicio')) settingsForm.treino_split.inicio = get('sf-treino-inicio').value || settingsForm.treino_split.inicio;
  if (get('sf-treino-meta')) settingsForm.treino_meta_kcal = parseFloat(get('sf-treino-meta').value) || null;
  if (get('sf-dormir')) settingsForm.sono_dormir = get('sf-dormir').value || settingsForm.sono_dormir;
  if (get('sf-acordar')) settingsForm.sono_acordar = get('sf-acordar').value || settingsForm.sono_acordar;
  if (get('sf-restricao')) settingsForm.restricao = get('sf-restricao').value || settingsForm.restricao;
}

function saveSettings() {
  _syncSettingsInputs();
  APP.profile = { ...settingsForm };
  saveProfile();
  showToast('Dados salvos! +10 XP', 'xp');
  showXPGain(10, window.innerWidth/2, window.innerHeight*0.15);
  // Re-render settings with updated profile (reinit form)
  settingsForm = null;
  renderSettings();
}

function settingsUpdateCronotipo() {
  const dormir = document.getElementById('sf-dormir')?.value;
  const acordar = document.getElementById('sf-acordar')?.value;
  const ct = calcularCronotipo(dormir, acordar);
  const box = document.getElementById('settings-cronotipo-box');
  if (box) {
    box.innerHTML = ct ? `<div class="settings-cronotipo"><p><strong>Cronotipo: ${ct.label}</strong> — Sua janela de melhor desempenho é ${ct.faixaPreferida}. Duração: ~${ct.duracaoSonoHoras.toFixed(1)}h/noite.</p></div>` : '';
  }
}

function resetApp() {
  if (!confirm('Tem certeza? Todos os dados serão apagados.')) return;
  localStorage.clear();
  location.reload();
}
</script>
